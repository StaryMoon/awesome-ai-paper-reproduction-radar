name: Check Radar

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate JSON
        run: python -m json.tool data/reproductions.json > /tmp/reproductions.json
      - name: Check generated files
        run: python scripts/build.py --check
